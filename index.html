<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>CircularityOptimizer</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #ffffff;
        font-family: sans-serif;
      }

      body {
        box-sizing: border-box;
      }

      #page-wrap {
        box-sizing: border-box;
        width: 100vw;
        height: 100vh;
        padding: 20px 50px 50px 50px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
      }

      #project-title {
        color: #CD7CA0;
        font-size: 20px;
        line-height: 1.2;
        margin: 0 0 8px 0;
        text-align: left;
        box-sizing: border-box;
      }

      #unity-container {
        position: relative;
        background: #ffffff;
        border: 1px solid #d9d9d9;
        box-sizing: border-box;
        flex: 0 0 auto;
      }

      #unity-canvas {
        display: block;
        background: #ffffff;
      }

      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }

      #unity-warning {
        position: absolute;
        left: 50%;
        top: 5%;
        transform: translateX(-50%);
        z-index: 20;
      }

      #unity-footer {
        position: absolute;
        right: 10px;
        bottom: 10px;
        z-index: 10;
      }

      #unity-logo,
      #unity-webgl-logo,
      #unity-build-title {
        display: none !important;
      }
    </style>

  </head>

  <body>
    <div id="page-wrap">
      <div id="project-title">Circularity Optimizer</div>

      <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width=1920 height=1080 tabindex="-1"></canvas>

        <div id="unity-loading-bar">
          <div id="unity-logo"></div>
          <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
          </div>
        </div>

        <div id="unity-warning"></div>

        <div id="unity-footer">
          <div id="unity-webgl-logo"></div>
          <div id="unity-fullscreen-button"></div>
          <div id="unity-build-title">CircularityOptimizer</div>
        </div>
      </div>
    </div>

    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");
      var pageWrap = document.querySelector("#page-wrap");
      var projectTitle = document.querySelector("#project-title");


      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? "block" : "none";
        }

        var div = document.createElement("div");
        div.innerHTML = msg;
        warningBanner.appendChild(div);

        if (type == "error") {
          div.style = "background: red; padding: 10px;";
        } else {
          if (type == "warning") {
            div.style = "background: yellow; padding: 10px;";
          }
          setTimeout(function () {
            if (div.parentNode === warningBanner) {
              warningBanner.removeChild(div);
            }
            updateBannerVisibility();
          }, 5000);
        }

        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/CircularityOptimizer.loader.js";

      var config = {
        dataUrl: buildUrl + "/CircularityOptimizer.data",
        frameworkUrl: buildUrl + "/CircularityOptimizer.framework.js",
        codeUrl: buildUrl + "/CircularityOptimizer.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "CircularityOptimizer",
        productVersion: "0.1",
        showBanner: unityShowBanner
      };

      function resizeCanvasToFit() {
        var targetWidth = 1920;
        var targetHeight = 1080;

        var pagePaddingLeftRight = 50;
        var pagePaddingTop = 20;
        var pagePaddingBottom = 50;
        var titleGap = 8;
        var titleHeight = projectTitle.getBoundingClientRect().height;

        var availableWidth = window.innerWidth - pagePaddingLeftRight * 2;
        var availableHeight = window.innerHeight - pagePaddingTop - pagePaddingBottom - titleHeight - titleGap;

        if (availableWidth < 1) availableWidth = 1;
        if (availableHeight < 1) availableHeight = 1;

        var targetAspect = targetWidth / targetHeight;
        var availableAspect = availableWidth / availableHeight;

        var displayWidth, displayHeight;

        if (availableAspect > targetAspect) {
          displayHeight = availableHeight;
          displayWidth = displayHeight * targetAspect;
        } else {
          displayWidth = availableWidth;
          displayHeight = displayWidth / targetAspect;
        }

        canvas.style.width = displayWidth + "px";
        canvas.style.height = displayHeight + "px";
        container.style.width = displayWidth + "px";
        container.style.height = displayHeight + "px";
        projectTitle.style.width = displayWidth + "px";
      }

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement("meta");
        meta.name = "viewport";
        meta.content = "width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes";
        document.getElementsByTagName("head")[0].appendChild(meta);

        pageWrap.style.padding = "20px";

        container.className = "unity-mobile";
        canvas.className = "unity-mobile";

      } else {
        container.className = "unity-desktop";
        resizeCanvasToFit();
        window.addEventListener("resize", resizeCanvasToFit);
      }


      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;

      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          progressBarFull.style.width = (100 * progress) + "%";
        }).then(function (unityInstance) {
          loadingBar.style.display = "none";


          fullscreenButton.onclick = function () {
            unityInstance.SetFullscreen(1);
          };

          resizeCanvasToFit();
        }).catch(function (message) {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
